# WorldBench Compose file.
#
#   docker compose build
#   docker compose run --rm worldbench worldbench list
#   docker compose run --rm worldbench worldbench run --task WC001_complete_floating_world --adapter mock
#
# Generated worlds and reports are written back to the host via the mounted
# outputs/ and reports/ directories.

services:
  worldbench:
    build:
      context: .
      dockerfile: Dockerfile
    image: worldbench:latest
    volumes:
      - ./outputs:/app/outputs
      - ./reports:/app/reports
    environment:
      # Pass provider credentials through from the host environment when running
      # against real models. Unset variables are simply ignored by the adapters.
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GEMINI_API_KEY
      - VLLM_BASE_URL
      # When using the optional ollama service below, point the adapter at it:
      - OLLAMA_HOST=http://ollama:11434
    # Override the entrypoint's default (`--help`) at the command line.
    command: ["list"]

  # Optional: a local Ollama server for offline open-model runs.
  # Enable with:  docker compose --profile local up ollama
  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

volumes:
  ollama-models:
