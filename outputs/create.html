<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

/* ================================================================== *
 *  BIOME GRAPH — ecological adjacencies drive layout.
 *  Far-north mountains (blizzard) → snow forest → highlands on the right
 *  (empty plain behind pink grove) → jungle / grassland plateau.
 *  Old western highland slot filled by extended jungle + swamp.
 * ================================================================== */

const BIOME = {
  MOUNTAIN: "mountain", HIGHLAND: "highland", JUNGLE: "jungle", SWAMP: "swamp",
  GRASSLAND: "grassland", GROVE: "grove", DESERT: "desert",
  VOLCANIC: "volcanic", CONIFER: "conifer", COAST: "coast",
};

const BIOME_EDGES = [
  [BIOME.MOUNTAIN,  BIOME.CONIFER,   "final peaks drop into snow forest"],
  [BIOME.CONIFER,   BIOME.HIGHLAND,  "snow forest opens onto highland plain"],
  [BIOME.MOUNTAIN,  BIOME.HIGHLAND,  "east mountain flank meets highland shelf"],
  [BIOME.HIGHLAND,  BIOME.GROVE,     "highland slopes down into pink forest"],
  [BIOME.JUNGLE,    BIOME.SWAMP,     "canopy drains into backwater marsh"],
  [BIOME.JUNGLE,    BIOME.GRASSLAND, "wet forest drains into open plain"],
  [BIOME.GRASSLAND, BIOME.GROVE,     "moist meadow seeds flowering grove"],
  [BIOME.GRASSLAND, BIOME.DESERT,    "rain shadow — moisture collapses"],
  [BIOME.DESERT,    BIOME.VOLCANIC,  "arid basin meets basalt (dry contact)"],
  [BIOME.VOLCANIC,  BIOME.GRASSLAND, "basalt skirts meet the open plain"],
  [BIOME.GRASSLAND, BIOME.COAST,     "main stem + delta reach the sea"],
  [BIOME.JUNGLE,    BIOME.COAST,     "jungle outlets feed coastal lagoons"],
  [BIOME.MOUNTAIN,  BIOME.COAST,     "west melt spills to western sea"],
];

/* Layout:
 *   Mountains at the north end; snow forest in front.
 *   Highlands relocated to the empty plain right of the snow forest,
 *   between the mountains and the back side of the pink grove.
 *   Western vacated area absorbed by larger jungle + swamp.
 */
const BIOMES = [
  // Final mountains — far end of the island (behind the snow forest)
  { id: BIOME.MOUNTAIN,  name: "Snow Mountains",  wx: "blizzard",  cx: -780, cz: -1100, radius: 440,
    base: 760, amp: 400, snow: true,  low: 0x6d7a86, high: 0xf4f8ff, tree: null,      rock: 0x8b95a1, density: 0 },
  // Elevated snow forest in front of those peaks
  { id: BIOME.CONIFER,   name: "Snowy Conifers",  wx: "snowfall",  cx: -480, cz: -620, radius: 420,
    base: 320, amp: 70,  snow: true,  low: 0x35513f, high: 0xdfeaf2, tree: "pine",    rock: 0x7c8a86, density: 1.4 },
  // Highlands — right of snow forest, between mountains & back of pink grove
  { id: BIOME.HIGHLAND,  name: "Highlands",       wx: "rain",      cx: 220,  cz: -520, radius: 340,
    base: 440, amp: 75,  snow: false, low: 0x8a8f6a, high: 0xb9c08e, tree: "shrub",   rock: 0x8d8672, density: 0.85 },
  // Expanded jungle — absorbs old western highland area
  { id: BIOME.JUNGLE,    name: "Dense Jungle",    wx: "rain",      cx: -280, cz: 20,   radius: 720,
    base: 155, amp: 85,  snow: false, low: 0x1a5230, high: 0x2a7540, tree: "broadleaf", rock: 0x5b5a4e, density: 2.05 },
  // Expanded swamp — fills more of the vacated west
  { id: BIOME.SWAMP,     name: "Backwater Swamp", wx: "mist",      cx: -700, cz: 100,  radius: 380,
    base: 38,  amp: 18,  snow: false, low: 0x2a3a28, high: 0x4a5e3a, tree: "mangrove", rock: 0x4a4538, density: 1.35, flat: true },
  // Open grassland plateau
  { id: BIOME.GRASSLAND, name: "Grasslands",      wx: "rain",      cx: 160,  cz: 380,  radius: 580,
    base: 72,  amp: 6,   snow: false, low: 0x4a7c28, high: 0x8fb84a, tree: "copse",   rock: 0x8f7c5c, density: 0.5, flat: true },
  { id: BIOME.GROVE,     name: "Flowering Grove", wx: "rain",      cx: 500,  cz: -40,  radius: 360,
    base: 95,  amp: 42,  snow: false, low: 0x6a9450, high: 0xc8e08a, tree: "blossom", rock: 0x93835f, density: 1.15 },
  { id: BIOME.DESERT,    name: "Desert",          wx: "sandstorm", cx: 480,  cz: 1040, radius: 460,
    base: 75,  amp: 16,  snow: false, low: 0xd2a45a, high: 0xedcf8a, tree: "cactus",  rock: 0xc49a5e, density: 0.9, flat: true },
  { id: BIOME.VOLCANIC,  name: "Volcano",         wx: "eruption",  cx: 1220, cz: 480,  radius: 340,
    base: 220, amp: 90,  snow: false, low: 0x241a18, high: 0x45302a, tree: null,      rock: 0x171010, density: 0, lava: true },
];
const byId = id => BIOMES.find(b => b.id === id);

function hash2(x, y) {
  const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
  return s - Math.floor(s);
}
function valueNoise(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y), xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const a = hash2(xi, yi), b = hash2(xi + 1, yi), c = hash2(xi, yi + 1), d = hash2(xi + 1, yi + 1);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
function fbm(x, y, o = 4) {
  let s = 0, a = 0.5, f = 1;
  for (let i = 0; i < o; i++) { s += a * (valueNoise(x * f, y * f) * 2 - 1); a *= 0.5; f *= 2.05; }
  return s;
}
const sstep = (a, b, x) => { const t = Math.min(1, Math.max(0, (x - a) / (b - a))); return t * t * (3 - 2 * t); };
const clamp01 = x => Math.min(1, Math.max(0, x));

/* ------------------------------------------------------------------ *
 *  seasons + square sun (cyclic day / year)
 * ------------------------------------------------------------------ */
const YEAR = 48;          // seconds per full seasonal cycle
const DAY = 16;           // seconds per day/night within seasons
const SEASONS = [
  { name: "Spring", tint: 0xfff6e0, soft: 0.15, rain: 1.1, snow: 0.35, leaf: 0x7cbc4a },
  { name: "Summer", tint: 0xfff1c2, soft: 0.0,  rain: 0.85, snow: 0.1,  leaf: 0x5aa034 },
  { name: "Autumn", tint: 0xffd9a8, soft: 0.25, rain: 0.7,  snow: 0.2,  leaf: 0xc47a2e },
  { name: "Winter", tint: 0xd8e8ff, soft: 0.55, rain: 0.35, snow: 1.0,  leaf: 0x8a9a6a },
];
function seasonState(t) {
  const u = ((t % YEAR) + YEAR) % YEAR / YEAR;
  const idx = Math.floor(u * 4) % 4;
  const next = (idx + 1) % 4;
  const blend = (u * 4) % 1;
  // smoothstep blend so seasons feel reliable, not flickery
  const k = blend * blend * (3 - 2 * blend);
  const A = SEASONS[idx], B = SEASONS[next];
  return {
    name: k < 0.5 ? A.name : B.name,
    idx, k,
    soft: A.soft + (B.soft - A.soft) * k,
    rain: A.rain + (B.rain - A.rain) * k,
    snow: A.snow + (B.snow - A.snow) * k,
    tint: new THREE.Color(A.tint).lerp(new THREE.Color(B.tint), k),
    leaf: new THREE.Color(A.leaf).lerp(new THREE.Color(B.leaf), k),
  };
}
function dayFactor(t) {
  // 0 night → 1 noon, cyclic
  return 0.55 + 0.45 * Math.sin((t / DAY) * Math.PI * 2);
}

const BOUNDS = 2000, SEA = 0, CELL = 24, STEP = 12;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 1, 50000);
const HOME = { pos: new THREE.Vector3(1900, 2600, 2300), tgt: new THREE.Vector3(60, 70, 80) };
camera.position.copy(HOME.pos);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(HOME.tgt);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 180;
controls.maxDistance = 11000;
controls.maxPolarAngle = Math.PI * 0.495;
controls.update();

const sunLight = new THREE.DirectionalLight(0xfff3d8, 2.5);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -2400; sunLight.shadow.camera.right = 2400;
sunLight.shadow.camera.top = 2400; sunLight.shadow.camera.bottom = -2400;
sunLight.shadow.camera.near = 100; sunLight.shadow.camera.far = 8000;
sunLight.shadow.bias = -0.0005;
scene.add(sunLight);
const hemi = new THREE.HemisphereLight(0xbfe0ff, 0x35281d, 0.75);
scene.add(hemi);
const amb = new THREE.AmbientLight(0xffffff, 0.22);
scene.add(amb);

// Visible square sun — orbits with the day cycle
const sunMesh = new THREE.Mesh(
  new THREE.BoxGeometry(140, 140, 140),
  new THREE.MeshBasicMaterial({ color: 0xffe08a })
);
scene.add(sunMesh);
const sunHalo = new THREE.Mesh(
  new THREE.BoxGeometry(200, 200, 40),
  new THREE.MeshBasicMaterial({ color: 0xffc45a, transparent: true, opacity: 0.35 })
);
scene.add(sunHalo);

function islandRadius(theta) {
  return 1880 + fbm(Math.cos(theta) * 2 + 10, Math.sin(theta) * 2 + 10, 3) * 120;
}
function coastFactor(x, z) {
  const south = sstep(1200, 1800, z);
  const west = 1 - sstep(-1550, -320, x);
  return clamp01(Math.max(south, west));
}

const volcanic = byId(BIOME.VOLCANIC);
const mountain = byId(BIOME.MOUNTAIN);
const highland = byId(BIOME.HIGHLAND);
const jungle   = byId(BIOME.JUNGLE);
const swamp    = byId(BIOME.SWAMP);
const grass    = byId(BIOME.GRASSLAND);
const grove    = byId(BIOME.GROVE);
const desert   = byId(BIOME.DESERT);
const conifer  = byId(BIOME.CONIFER);

// Proper stratovolcano cone (tall mountain, not a plateau puddle)
function volcanoShape(x, z) {
  const d = Math.hypot(x - volcanic.cx, z - volcanic.cz);
  const cone = 720 * Math.pow(sstep(320, 20, d), 1.15);
  const crater = -220 * sstep(70, 14, d);
  const ridge = 40 * fbm(x * 0.01, z * 0.01, 2) * sstep(300, 80, d) * (1 - sstep(70, 20, d));
  return cone + crater + ridge;
}
const craterTop = () => volcanic.base + volcanoShape(volcanic.cx + 20, volcanic.cz + 20);

// Desert mountains — sandstone peaks on the vast flat floor (not the volcano)
const DESERT_PEAKS = [
  [desert.cx - 240, desert.cz - 120, 230, 130],
  [desert.cx + 220, desert.cz + 80,  210, 120],
  [desert.cx + 60,  desert.cz - 220, 190, 110],
  [desert.cx - 90,  desert.cz + 200, 170, 100],
];
function desertMountains(x, z) {
  let h = 0;
  for (const [px, pz, peak, rad] of DESERT_PEAKS) {
    const d = Math.hypot(x - px, z - pz);
    h += peak * Math.pow(sstep(rad, 8, d), 1.2);
  }
  return h;
}

// Final mountains at the far north end of the island
const SNOW_PEAKS = [
  [-1100, -1180, 520, 210],
  [-860,  -1220, 580, 230],
  [-640,  -1140, 500, 200],
  [-460,  -1080, 400, 170],
];
// Blizzard on the behind mountain — 4× original width along the rear face
const BLIZZARD_TAPE = [
  [-1270, -1320],
  [-980,  -1360],
  [-700,  -1380],
  [-420,  -1340],
  [-140,  -1280],
  [250,   -1220],
];
function blizzardTapePoint(t, lateral = 0) {
  const n = BLIZZARD_TAPE.length - 1;
  const u = clamp01(t) * n;
  const i = Math.min(n - 1, Math.floor(u));
  const f = u - i;
  const ax = BLIZZARD_TAPE[i][0], az = BLIZZARD_TAPE[i][1];
  const bx = BLIZZARD_TAPE[i + 1][0], bz = BLIZZARD_TAPE[i + 1][1];
  const x = ax + (bx - ax) * f;
  const z = az + (bz - az) * f;
  const dx = bx - ax, dz = bz - az;
  const len = Math.hypot(dx, dz) || 1;
  const px = -dz / len, pz = dx / len;
  const side = (pz < 0 ? 1 : -1);
  return [x + px * lateral * side, z + pz * lateral * side];
}
function snowRangeHeight(x, z) {
  let h = 0;
  for (const [px, pz, peak, rad] of SNOW_PEAKS) {
    const d = Math.hypot(x - px, z - pz);
    h += peak * Math.pow(sstep(rad, 10, d), 1.15);
  }
  return h;
}
function nearSnowRange(x, z, scale = 1.05) {
  for (const [px, pz, , rad] of SNOW_PEAKS) {
    if (Math.hypot(x - px, z - pz) < rad * scale) return true;
  }
  return false;
}
/** Snow forest shelf in front of the final peaks (extends east toward highlands) */
function inFoothillForest(x, z) {
  if (x < -980 || x > 40 || z < -820 || z > -400) return false;
  if (nearSnowRange(x, z, 0.7)) return false;
  let nearFlank = false;
  for (const [px, pz, , rad] of SNOW_PEAKS) {
    const dx = x - px, dz = z - pz;
    const d = Math.hypot(dx, dz);
    if (dz > 60 && d > rad * 0.55 && d < rad * 2.1) nearFlank = true;
  }
  const along = x > -900 && x < 20 && z > -760 && z < -460;
  return nearFlank || along;
}

/* -- Ecological hydrology ---------------------------------------------
   Wet corridor: mountain melt → snow forest → jungle → grassland → ocean.
   Highlands (east of snow forest) drain gently into the pink grove.
   Backwater swamp sits behind the jungle. Desert stays dry.
   ------------------------------------------------------------------ */
function jig(pts, amt = 48) {
  return pts.map((p, i) => i === 0 || i === pts.length - 1 ? p
    : [p[0] + (hash2(i, p[1]) - 0.5) * amt, p[1] + (hash2(p[0], i) - 0.5) * amt]);
}
function seg(a, b, n) {
  const out = [];
  for (let i = 0; i <= n; i++) out.push([a[0] + (b[0] - a[0]) * i / n, a[1] + (b[1] - a[1]) * i / n]);
  return jig(out);
}
function zigzag(pts, nPer = 4) {
  const out = [];
  for (let i = 0; i < pts.length - 1; i++) out.push(...seg(pts[i], pts[i + 1], nPer).slice(0, -1));
  out.push(pts[pts.length - 1]);
  return jig(out, 36);
}

const JC = [jungle.cx, jungle.cz];
const J_OUT = [jungle.cx + 180, jungle.cz + 260];
const G_IN = [grass.cx - 100, grass.cz - 60];
const G_MID = [grass.cx - 40, grass.cz + 140];
const PD = [grass.cx - 140, grass.cz + 380];
// Western delta mouths → southern/western ocean (wet corridor)
const OCEAN_W  = [PD[0] - 320, 1480];
const OCEAN_M  = [PD[0] - 40,  1580];
const OCEAN_SW = [PD[0] - 480, 1320];
const OCEAN_SE = [PD[0] - 80,  1520];

// Standing backwater pools in the swamp (stagnant, not desert-bound)
const SWAMP_POOLS = [
  [swamp.cx + 20,  swamp.cz - 10,  130],
  [swamp.cx - 140, swamp.cz + 90,  95],
  [swamp.cx + 130, swamp.cz + 70,  85],
  [swamp.cx - 40,  swamp.cz - 140, 75],
];
const SWAMP_CH = zigzag([
  [jungle.cx - 300, jungle.cz + 40],
  [swamp.cx + 100, swamp.cz - 40],
  [swamp.cx - 40, swamp.cz + 30],
  [swamp.cx - 140, swamp.cz - 60],
], 3);
const LAVA_POOL = [volcanic.cx - 25, volcanic.cz + 260];
const LAVA_POOL2 = [volcanic.cx + 200, volcanic.cz + 150];
const LAVA_POOL3 = [volcanic.cx - 80, volcanic.cz - 220];
const LAVA_CH = seg([volcanic.cx + 8, volcanic.cz + 55], LAVA_POOL, 8);
const LAVA_CH2 = seg([volcanic.cx + 55, volcanic.cz + 30], LAVA_POOL2, 7);
const LAVA_CH3 = seg([volcanic.cx - 22, volcanic.cz - 50], LAVA_POOL3, 6);
const LAVA_POOL_R = 110, LAVA_POOL2_R = 90, LAVA_POOL3_R = 80;

const RIVERS = [
  // meltwater from final mountains → snow-forest fringe → jungle west edge
  { pts: seg([mountain.cx + 40, mountain.cz + 160], [conifer.cx - 40, conifer.cz - 40], 5), w: 1.05 },
  { pts: seg([mountain.cx - 120, mountain.cz + 200], [conifer.cx - 160, conifer.cz + 40], 5), w: 0.95 },
  { pts: zigzag([
      [conifer.cx - 80, conifer.cz + 80],
      [conifer.cx + 40, conifer.cz + 200],
      [JC[0] - 160, JC[1] - 180],
    ], 4), w: 1.45 },
  { pts: zigzag([
      [conifer.cx + 100, conifer.cz + 60],
      [JC[0] - 40, JC[1] - 160],
      [JC[0] + 20, JC[1] - 80],
    ], 4), w: 1.25 },

  // highland shelf → gentle drain into pink grove
  { pts: zigzag([
      [highland.cx - 60, highland.cz - 40],
      [highland.cx + 40, highland.cz + 60],
      [grove.cx - 80, grove.cz - 40],
      [grove.cx - 20, grove.cz + 20],
    ], 4), w: 1.15 },
  { pts: seg([highland.cx + 80, highland.cz + 20], [grove.cx + 40, grove.cz - 60], 4), w: 0.9 },

  // weave the large jungle → plains outlet
  { pts: zigzag([[JC[0] - 140, JC[1] - 160], [JC[0] - 260, JC[1] - 40], [JC[0] - 100, JC[1] + 140], J_OUT], 4), w: 1.75 },
  { pts: zigzag([[JC[0] - 200, JC[1] - 40], [JC[0] - 300, JC[1] + 100], [JC[0] - 80, JC[1] + 220], J_OUT], 4), w: 1.35 },
  { pts: zigzag([[JC[0] + 40, JC[1] - 140], [JC[0] + 200, JC[1] - 20], [JC[0] + 140, JC[1] + 160], J_OUT], 4), w: 1.4 },
  { pts: zigzag([[JC[0] + 220, JC[1] + 60], [JC[0] + 100, JC[1] + 220], J_OUT], 3), w: 1.15 },
  { pts: zigzag([[JC[0] - 320, JC[1] + 60], [JC[0] - 140, JC[1] + 240], J_OUT], 3), w: 1.05 },

  // flat grassland trunk + plain feeders → western delta → ocean
  { pts: seg(J_OUT, G_IN, 5), w: 2.1 },
  { pts: seg(G_IN, G_MID, 4), w: 2.3 },
  { pts: seg([grass.cx - 240, grass.cz + 40], G_MID, 5), w: 1.15 },
  { pts: seg([grass.cx + 200, grass.cz + 60], G_MID, 5), w: 1.1 },
  { pts: seg([grass.cx - 40, grass.cz - 120], G_MID, 4), w: 0.95 },
  { pts: seg(G_MID, PD, 6), w: 2.6 },
  { pts: seg(PD, OCEAN_W, 8), w: 1.7 },
  { pts: seg(PD, OCEAN_M, 8), w: 1.95 },
  { pts: seg(PD, OCEAN_SW, 7), w: 1.45 },
  { pts: seg(PD, OCEAN_SE, 8), w: 1.7 },

  // jungle → backwater (stagnant swamp channel, stays in wet canopy/swamp)
  { pts: SWAMP_CH, w: 1.55, swampOnly: true },

  // grove / plateau feeders
  { pts: zigzag([[grass.cx + 140, grass.cz - 80], [grove.cx - 90, grove.cz + 130], [grove.cx - 20, grove.cz + 20], [grove.cx + 50, grove.cz - 40]], 4), w: 1.0 },
  { pts: seg([grove.cx + 60, grove.cz - 20], [grove.cx + 20, grove.cz + 100], 3), w: 0.75 },

  // western ocean melt from the final mountains
  { pts: zigzag([
      [mountain.cx - 80, mountain.cz + 120],

    best = Math.min(best, Math.hypot(x - (ax + dx * t), z - (az + dz * t)));

function scatter(biome, count, filter) {
  const pts = [];
  let tries = 0;
  const isDesert = biome.id === BIOME.DESERT;
  while (pts.length < count && tries < count * (isDesert ? 28 : 16)) {
    tries++;
    const a = Math.random() * Math.PI * 2;
    // uniform disk — desert uses full vast radius so cacti aren't clustered
    const r = Math.sqrt(Math.random()) * biome.radius * (isDesert ? 0.92 : 0.98);
    const x = biome.cx + Math.cos(a) * r, z = biome.cz + Math.sin(a) * r;
    const c = cellAt(x, z);
    if (!c || c.kind !== "land") continue;
    // Desert: accept any cell still inside the desert basin (ownership can fringe)
    if (isDesert) {
      if (Math.hypot(c.x - biome.cx, c.z - biome.cz) > biome.radius * 0.95) continue;
      if (c.biome.id !== BIOME.DESERT && c.biome.id !== BIOME.GRASSLAND) continue;
      if (desertMountains(c.x, c.z) > 50) continue; // flats only, not peak tops
      if (c.top < SEA + STEP) continue;
    } else {
      if (c.biome.id !== biome.id) continue;
      if (c.island < 0.85 || c.coast > 0.25 || c.top < SEA + STEP) continue;
    }
    if (filter && !filter(c)) continue;
    pts.push([c.x, c.top, c.z]);
  }
  return pts;
}

  const g = new THREE.Group();
  for (const { geo, color } of parts) {
    const mesh = new THREE.InstancedMesh(geo, new THREE.MeshLambertMaterial({ color }), pts.length || 1);
    mesh.castShadow = mesh.receiveShadow = true;
    const m = new THREE.Matrix4(), q = new THREE.Quaternion(), s = new THREE.Vector3();
    pts.forEach(([x, y, z], i) => {
      const sc = s0 + hash2(x, z) * (s1 - s0);
      q.setFromEuler(new THREE.Euler(0, Math.floor(hash2(z, x) * 4) * Math.PI / 2, 0));
      s.set(sc, sc, sc);
      m.compose(new THREE.Vector3(x, y, z), q, s);
      mesh.setMatrixAt(i, m);
    });
    if (pts.length) g.add(mesh);
  }
  scene.add(g);
  return g;
}

/* ================================================================== *
 *  CLIMATE — weather arrives in natural bursts: appears, holds, fades,
 *  then clears before the next cycle. Systems are staggered so the
 *  island is never locked in one continuous storm.
 * ================================================================== */
const particleSystems = [];
function particles({ count, size, color, opacity, emissive, update }) {
  const g = new THREE.BoxGeometry(size, size, size);
  const mat = emissive
    ? new THREE.MeshBasicMaterial({ color, transparent: true, opacity })
    : new THREE.MeshLambertMaterial({ color, transparent: true, opacity });
  const mesh = new THREE.InstancedMesh(g, mat, count);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  mesh.frustumCulled = false;
  const seeds = Array.from({ length: count }, (_, i) => ({
    a: hash2(i, 1.3), b: hash2(i, 7.7), c: hash2(i, 13.1), d: hash2(i, 23.7),
  }));
  scene.add(mesh);
  particleSystems.push({ mesh, seeds, update });
  return mesh;
}
const M = new THREE.Matrix4();
const setP = (mesh, i, x, y, z, sx = 1, sy = 1, sz = 1) => {
  M.makeScale(sx, sy, sz); M.setPosition(x, y, z); mesh.setMatrixAt(i, M);
};
const topAt = (x, z) => { const c = cellAt(x, z); return c ? c.top : SEA; };

let seasonNow = seasonState(0);

/** Soft on/off envelope: fade in → hold → fade out → quiet gap. Returns 0..1. */
function weatherPulse(t, period, duty, phase = 0) {
  const u = (((t / period) + phase) % 1 + 1) % 1;
  if (u >= duty) return 0;
  const local = u / duty;
  const fade = 0.22;
  if (local < fade) return local / fade;
  if (local > 1 - fade) return (1 - local) / fade;
  return 1;
}

// Staggered event clocks per biome / phenomenon (seconds, duty, phase)
const WX = {
  jungleRain:   { period: 22, duty: 0.48, phase: 0.00 },
  highlandRain: { period: 26, duty: 0.38, phase: 0.18 },
  grassRain:    { period: 28, duty: 0.35, phase: 0.42 },
  groveRain:    { period: 24, duty: 0.40, phase: 0.61 },
  jungleMist:   { period: 18, duty: 0.45, phase: 0.55 },
  swampMist:    { period: 16, duty: 0.58, phase: 0.22 },
  deltaMist:    { period: 20, duty: 0.42, phase: 0.30 },
  mountainSnow: { period: 16, duty: 0.62, phase: 0.05 },
  coniferSnow:  { period: 16, duty: 0.65, phase: 0.08 }, // snow clouds over the snow forest
  blizzard:     { period: 14, duty: 0.80, phase: 0.00 }, // end-of-island mountain slopes
  desertWind:   { period: 16, duty: 0.40, phase: 0.12 },
  sandstorm:    { period: 30, duty: 0.32, phase: 0.50 },
  ash:          { period: 17, duty: 0.55, phase: 0.20 },
};

function cloudDeck(biome, count, heightAbove, color, opacity, pulse) {
  const R = biome.radius * 1.65;
  particles({
    count, size: 26, color, opacity,
    update(s, i, t, mesh) {
      const vis = weatherPulse(t, pulse.period, pulse.duty, pulse.phase + s.d * 0.04);
      if (vis < 0.02) { setP(mesh, i, 0, -9000, 0); return; }
      const windX = t * (28 + s.c * 18);
      const windZ = t * (10 + s.d * 8);
      let lx = (s.a - 0.5) * 2 * R + windX;
      let lz = (s.b - 0.5) * 2 * R + windZ;
      lx = ((lx % (2 * R)) + 2 * R) % (2 * R) - R;
      lz = ((lz % (2 * R)) + 2 * R) % (2 * R) - R;
      const x = biome.cx + lx;
      const z = biome.cz + lz;
      const ground = topAt(x, z);
      if (ground <= SEA - 40) { setP(mesh, i, 0, -9000, 0); return; }
      const y = ground + heightAbove + s.d * 36 + Math.sin(t * 0.35 + s.a * 5) * 10;
      const sc = (1.2 + s.c * 2.4) * (0.55 + 0.45 * vis);
      setP(mesh, i, x, y, z, sc * 1.8, sc * 0.55, sc);
      mesh.material.opacity = opacity * vis * (0.7 + 0.3 * seasonNow.rain);
    },
  });
}

function rainSystem(biome, count, cloudH, pulse) {
  cloudDeck(biome, Math.max(12, Math.round(count / 16)), cloudH, 0xf2f6fa, 0.5, pulse);
  particles({
    count, size: 3, color: 0x9fd4ff, opacity: 0.75, emissive: true,
    update(s, i, t, mesh) {
      const vis = weatherPulse(t, pulse.period, pulse.duty, pulse.phase) * Math.min(1, seasonNow.rain / 0.7);
      if (vis < 0.08) { setP(mesh, i, 0, -9000, 0); return; }
      if (s.a > vis) { setP(mesh, i, 0, -9000, 0); return; }
      const x = biome.cx + (s.a - 0.5) * biome.radius * 1.7;
      const z = biome.cz + (s.b - 0.5) * biome.radius * 1.7;
      const ground = Math.max(SEA, topAt(x, z));
      const ceil = ground + cloudH + 50;
      const cycle = 2.2 + s.c * 1.6;
      const f = ((t * (1.4 + s.d * 0.8) + s.c * cycle) % cycle) / cycle;
      const y = ceil - f * (ceil - ground);
      setP(mesh, i, x + f * 10, y, z, 0.65, 3.8, 0.65);
    },
  });
}

function blizzardSampleXZ(s) {

  return [x + (s.b - 0.5) * 160, z - s.c * 60];

const ERUPTION_PERIOD = 18, ERUPTION_LEN = 4.2;
const eruptionActive = t => (t % ERUPTION_PERIOD) < ERUPTION_LEN;
particles({
  count: 180, size: 8, color: 0xff7a20, opacity: 1, emissive: true,
  update(s, i, t, mesh) {
    const phase = (t % ERUPTION_PERIOD);
    if (phase > ERUPTION_LEN) { setP(mesh, i, 0, -9000, 0); return; }
    const life = ((phase * (0.7 + s.c) + s.d * 2) % ERUPTION_LEN) / ERUPTION_LEN;
    const ang = s.a * Math.PI * 2, spd = 50 + s.b * 160;
    const x = volcanic.cx + Math.cos(ang) * spd * life * 2.0;
    const z = volcanic.cz + Math.sin(ang) * spd * life * 2.0;
    const y = craterTop() + 50 + 620 * life - 700 * life * life;
    if (y < topAt(x, z)) { setP(mesh, i, 0, -9000, 0); return; }
    const sc = 0.8 + s.c * 1.2;
    setP(mesh, i, x, y, z, sc, sc, sc);
  },
});

  count: 100, size: 5, color: 0xffaa33, opacity: 1, emissive: true,
  update(s, i, t, mesh) {

    if (surge < 0.08 || s.a > surge) { setP(mesh, i, 0, -9000, 0); return; }
    const ch = s.a < 0.34 ? LAVA_CH : s.a < 0.67 ? LAVA_CH2 : LAVA_CH3;
    const idx = Math.min(ch.length - 2, Math.floor(((t * (0.35 + s.c * 0.4) + s.d) % 1) * (ch.length - 1)));
    const a = ch[idx], b = ch[idx + 1];
    const f = ((t * 1.2 + s.b * 5) % 1);
    const x = a[0] + (b[0] - a[0]) * f;
    const z = a[1] + (b[1] - a[1]) * f;
    setP(mesh, i, x, topAt(x, z) + 12 + Math.sin(t * 8 + s.a * 20) * 3, z, 0.9, 0.9, 0.9);

});

const foot = document.createElement("div");
foot.className = "foot";
foot.textContent = "drag · scroll · square sun cycles day · seasons top-right";
legend.appendChild(foot);

const clock = new THREE.Clock();
function animate() {
  const t = clock.getElapsedTime();
  seasonNow = seasonState(t);
  seasonNameEl.textContent = seasonNow.name;

  // square sun orbit — cyclic day pattern
  const ang = (t / DAY) * Math.PI * 2;
  const sunR = 2500, sunH = 980 + Math.sin(ang) * 720;
  const sx = Math.cos(ang) * sunR;
  const sz = Math.sin(ang) * sunR * 0.65 - 400;
  sunMesh.position.set(sx, sunH, sz);
  sunHalo.position.copy(sunMesh.position);
  sunHalo.rotation.y = ang;
  sunMesh.rotation.y = ang * 0.5;
  sunMesh.rotation.z = ang * 0.25;

  const day = dayFactor(t);
  const sunCol = seasonNow.tint.clone().multiplyScalar(0.55 + 0.45 * day);
  sunMesh.material.color.copy(sunCol);
  sunHalo.material.color.copy(sunCol);
  sunHalo.material.opacity = 0.2 + 0.25 * day;
  sunLight.position.copy(sunMesh.position);
  sunLight.color.copy(sunCol);
  sunLight.intensity = (1.2 + 1.6 * day) * (1 - seasonNow.soft * 0.35);
  hemi.intensity = 0.35 + 0.5 * day;
  amb.intensity = 0.12 + 0.16 * day;

  ocean.position.y = SEA - 7 + Math.sin(t * 0.6) * 1.5;
  waterfallGroup.children.forEach((w, i) => { w.material.opacity = 0.45 + 0.15 * Math.sin(t * 3 + i); });

  for (const ps of particleSystems) {
    ps.seeds.forEach((s, i) => ps.update(s, i, t, ps.mesh));
    ps.mesh.instanceMatrix.needsUpdate = true;
  }

  if (glowLight) glowLight.intensity = eruptionActive(t) ? 5.0 + Math.sin(t * 14) * 1.8 : 2.2 + Math.sin(t * 3) * 0.4;

  if (flyGoal) {
    camera.position.lerp(flyGoal.pos, 0.045);
    controls.target.lerp(flyGoal.tgt, 0.045);
    if (camera.position.distanceTo(flyGoal.pos) < 4) flyGoal = null;
  }

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

document.getElementById("loading").remove();
animate();
</script>
</body>
</html>
