# WorldBench composite scoring weights.
#
# Each metric produces a 0-100 sub-score; the overall score is the
# weight-weighted sum of those sub-scores. Weights sum to 1.0 so the overall
# score is itself on a 0-100 scale. Ecological correctness carries the most
# weight because faithful, living ecology is WorldBench's central concern;
# creativity carries the least because, absent a reference world, it is the
# softest and most heuristic signal.

schema_validity: 0.15          # conforms to the schema and structural validators
completeness: 0.10             # every section populated with real content
terrain_correctness: 0.10      # coherent elevations and landform logic
hydrology_correctness: 0.10    # water flows downhill and terminates properly
ecological_correctness: 0.20   # species belong where they are placed; diets make sense
interaction_richness: 0.10     # a genuine, varied ecological web
spatial_coherence: 0.10        # the map connects and biomes border plausibly
biodiversity: 0.10             # taxonomic and functional variety across trophic levels
creativity: 0.05               # heuristic novelty/richness proxy
